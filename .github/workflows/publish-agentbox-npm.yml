name: Publish Agentbox CLI to npm

on:
  push:
    tags:
      - "agentbox-cli-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Verify CLI version matches release tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PACKAGE_VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync('npm/agentbox/package.json', 'utf8')).version")
          TAG_VERSION="${GITHUB_REF_NAME#agentbox-cli-v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "npm/agentbox/package.json version ($PACKAGE_VERSION) does not match tag version ($TAG_VERSION)."
            exit 1
          fi

      - name: Run CLI tests
        run: go test ./internal/agentbox/cli ./internal/agentbox/profiles

      - name: Build npm release artifacts
        run: node ./scripts/prepare-agentbox-npm.mjs

      - name: Pack npm package
        run: npm pack ./npm/agentbox

      - name: Publish npm package
        working-directory: npm/agentbox
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PACKAGE_VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync('npm/agentbox/package.json', 'utf8')).version")
          gh release create "$GITHUB_REF_NAME" \
            --title "Agentbox CLI v${PACKAGE_VERSION}" \
            --notes "Published @amxv/agentbox@${PACKAGE_VERSION} to npm."
